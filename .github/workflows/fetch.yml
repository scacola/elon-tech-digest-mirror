name: Fetch tech-digest sources

on:
  schedule:
    # 21:00 UTC daily = 06:00 KST — 2h before the claude.ai cron at 08:00 KST.
    # GHA cron has been observed to delay scheduled runs by 60-67 min under load,
    # so the previous 1h buffer (22:00 UTC) was not enough — routine read stale
    # data on 2026-05-21 because fetch fired 3 min after routine.
    - cron: '0 21 * * *'
  workflow_dispatch: {}

# Cancel any older queued/running fetch when a new one starts. Prevents an old
# queued fetch from racing the next-day's routine.
concurrency:
  group: fetch-tech-digest
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install --quiet requests feedparser beautifulsoup4

      - name: Ensure data dir
        run: mkdir -p data

      - name: Fetch Reddit (via Arctic Shift — no auth needed)
        run: python scripts/fetch_reddit.py
        continue-on-error: true

      - name: Fetch DCInside
        run: python scripts/fetch_dcinside.py
        continue-on-error: true

      - name: Fetch blogs (Anthropic / OpenAI / DeepMind / Meta / HF / Mistral)
        run: python scripts/fetch_blogs.py
        continue-on-error: true

      - name: Fetch ArXiv (cs.AI / cs.LG / cs.CL, 72h)
        run: python scripts/fetch_arxiv.py
        continue-on-error: true

      - name: Fetch Hacker News (AI-filtered, 24h)
        run: python scripts/fetch_hackernews.py
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          git config user.name "tech-digest-bot"
          git config user.email "bot@noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
